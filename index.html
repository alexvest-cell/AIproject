  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            surface: {
              base: '#0B0F14',
              alt: '#0F141A',
              card: '#111826',
              elevated: '#162033',
              hover: '#1B2433',
            },
            border: {
              subtle: 'rgba(255,255,255,0.06)',
              divider: 'rgba(255,255,255,0.04)',
            },
            news: {
              bg: '#0B0F14', // Updated Main Background
              paper: '#111826', // Card Surface
              text: '#AEB6C2', // Brighter body copy
              muted: '#7E8794', // Dimmer metadata
              accent: '#2BD4C3', // New ToolCurrent Cyan accent
              accentHover: '#3FE7D6', // Gradient target
              live: '#ef4444',
              border: 'rgba(255,255,255,0.06)',
            },
          },
          boxShadow: {
            'elevation': '0 0 0 1px rgba(255,255,255,0.03), 0 8px 24px rgba(0,0,0,0.35)',
            'elevation-hover': '0 0 0 1px rgba(255,255,255,0.06), 0 12px 32px rgba(0,0,0,0.45)',
          },
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            serif: ['Playfair Display', 'serif'], // Editorial Serif
          },
          animation: {
            'fade-in': 'fadeIn 0.6s ease-out forwards',
            'slide-up': 'slideUp 0.8s ease-out forwards',
          },
          keyframes: {
            fadeIn: {
              '0%': { opacity: '0' },
              '100%': { opacity: '1' },
            },
            slideUp: {
              '0%': { opacity: '0', transform: 'translateY(20px)' },
              '100%': { opacity: '1', transform: 'translateY(0)' },
            }
          }
        },
      },
    }
  </script>
